global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/homelab_alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_pve'
    static_configs:
      - targets: ['10.2.7.64:9100']

  - job_name: 'node_containers'
    static_configs:
      - targets: ['10.2.7.108:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['10.2.7.108:8080']

  - job_name: 'pihole'
    static_configs:
      - targets: ['10.2.7.108:9617']
