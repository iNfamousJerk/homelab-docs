services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - 9090:9090
    volumes:
      - prometheus_data:/prometheus
      - /opt/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/monitoring/homelab_alerts.yml:/etc/prometheus/homelab_alerts.yml:ro
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - 8080:8080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=ChangeMe123
    volumes:
      - grafana_data:/var/lib/grafana
      - /opt/monitoring/provisioning/:/etc/grafana/provisioning/:ro
      - /opt/monitoring/dashboards/:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined

  pihole-exporter:
    image: ekofr/pihole-exporter:latest
    container_name: pihole-exporter
    ports:
      - 9617:9617
    environment:
      - PIHOLE_HOSTNAME=10.2.7.209
      - PIHOLE_PASSWORD=PiHoleIsKing
      - PIHOLE_PROTOCOL=http
      - PIHOLE_PORT=80
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - 9093:9093
    volumes:
      - /opt/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined

  webhook:
    image: python:3-alpine
    container_name: webhook
    ports:
      - 5000:5000
    volumes:
      - /opt/monitoring/webhook/receiver.py:/app/receiver.py:ro
    command: python /app/receiver.py
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined

volumes:
  prometheus_data:
  grafana_data:
