# ============================================================
# Pirate Media Stack — Testing Mode (No VPN)
# ============================================================
# When you add ProtonVPN later, insert Gluetun service
# and set qBittorrent network_mode: "service:gluetun"
#
# Nginx Proxy Manager on port 80/443 provides subdomain access:
#   *.pirate.lan → 10.2.7.109
# NPM Admin UI: http://10.2.7.109:81  (login: admin@example.com / changeme)
# Vaultwarden accessed via NPM -> vaultwarden.pirate.lan
#
# Add a wildcard A record in Pi-hole: *.pirate.lan → 10.2.7.109
# ============================================================

x-puid: &puid "1000"
x-pgid: &pgid "1000"
x-tz: &tz "America/New_York"
x-dns: &dns
  - "1.1.1.1"
  - "1.0.0.1"
x-restart: &restart "unless-stopped"
x-apparmor: &apparmor
  security_opt:
    - apparmor=unconfined

services:
  # ─── Reverse Proxy (Web UI) ────────────────────────────────
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./config/npm/data:/data
      - ./config/npm/letsencrypt:/etc/letsencrypt
    restart: *restart

  # ─── Password Manager ──────────────────────────────────────
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    environment:
      - SIGNUPS_ALLOWED=true
      - DOMAIN=https://vaultwarden.pirate.lan
      - WEBSOCKET_ENABLED=true
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN:-CHANGEME_ADMIN_TOKEN}
    volumes:
      - ./config/vaultwarden:/data
    restart: *restart

  # ─── Torrent Client ────────────────────────────────────────
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
      UMASK: "002"
    volumes:
      - ./config/qbittorrent:/config
      - /data:/data
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    <<: *apparmor
    restart: *restart

  # ─── Indexer Aggregator ────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:develop
    container_name: prowlarr
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/prowlarr:/config
    ports:
      - "9696:9696"
    <<: *apparmor
    restart: *restart

  # ─── Cloudflare Bypass ─────────────────────────────────────
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=warn
    ports:
      - "8191:8191"
    restart: *restart

  # ─── Movie Automation ──────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/radarr:/config
      - /data:/data
    ports:
      - "7878:7878"
    <<: *apparmor
    restart: *restart

  # ─── TV Show Automation ────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/sonarr:/config
      - /data:/data
    ports:
      - "8989:8989"
    <<: *apparmor
    restart: *restart

  # ─── Music Automation ──────────────────────────────────────
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/lidarr:/config
      - /data:/data
    ports:
      - "8686:8686"
    <<: *apparmor
    restart: *restart

  # ─── Subtitles ─────────────────────────────────────────────
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/bazarr:/config
      - /data:/data
    ports:
      - "6767:6767"
    <<: *apparmor
    restart: *restart

  # ─── Media Server ──────────────────────────────────────────
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/jellyfin:/config
      - /data/media:/data/media
    ports:
      - "8096:8096"
    <<: *apparmor
    restart: *restart

  # ─── Media Requests ────────────────────────────────────────
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      PUID: *puid
      PGID: *pgid
      TZ: *tz
    volumes:
      - ./config/jellyseerr:/config
    ports:
      - "5055:5055"
    <<: *apparmor
    restart: *restart